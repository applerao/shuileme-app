<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 使用场景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1000px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .card-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a3e;
            margin-bottom: 15px;
        }
        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .title {
            position: absolute;
            top: 40px;
            color: #1a1a3e;
            font-size: 42px;
            font-weight: bold;
        }
        .highlight {
            color: #ff6b35;
        }
    </style>
</head>
<body>
    <div class="title">OpenClaw <span class="highlight">应用场景</span></div>
    <div class="container">
        <div class="card">
            <div class="card-icon">📰</div>
            <div class="card-title">内容创作</div>
            <div class="card-desc">写文章、生成报告、<br>整理资料、翻译文档</div>
        </div>
        <div class="card">
            <div class="card-icon">📊</div>
            <div class="card-title">数据分析</div>
            <div class="card-desc">抓取网页数据、<br>处理 Excel、生成图表</div>
        </div>
        <div class="card">
            <div class="card-icon">⏰</div>
            <div class="card-title">自动提醒</div>
            <div class="card-desc">定时任务、日程管理、<br>循环提醒、消息通知</div>
        </div>
        <div class="card">
            <div class="card-icon">🌐</div>
            <div class="card-title">信息搜集</div>
            <div class="card-desc">搜索调研、监控变化、<br>价格追踪、新闻聚合</div>
        </div>
        <div class="card">
            <div class="card-icon">💻</div>
            <div class="card-title">开发辅助</div>
            <div class="card-desc">代码生成、调试帮助、<br>文档查询、Git 操作</div>
        </div>
        <div class="card">
            <div class="card-icon">🏠</div>
            <div class="card-title">智能家居</div>
            <div class="card-desc">设备控制、场景联动、<br>语音助手、自动化</div>
        </div>
    </div>
</body>
</html>
