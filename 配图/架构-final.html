<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心架构图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
        }
        .title {
            position: absolute;
            top: 50px;
            font-size: 42px;
            font-weight: bold;
            color: white;
            letter-spacing: 4px;
        }
        .diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .layer {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .card {
            width: 200px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.15) 0%, rgba(255, 107, 53, 0.05) 100%);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }
        .card-icon {
            width: 50px;
            height: 50px;
            flex-shrink: 0;
        }
        .card-text {
            color: white;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .card-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        .core {
            width: 280px;
            height: 100px;
            background: radial-gradient(ellipse, rgba(255, 107, 53, 0.3) 0%, rgba(255, 107, 53, 0.1) 100%);
            border: 2px solid rgba(255, 107, 53, 0.5);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .core-icon {
            width: 60px;
            height: 60px;
        }
        .core-text {
            color: white;
            text-align: left;
        }
        .core-title {
            font-size: 24px;
            font-weight: bold;
        }
        .core-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }
        .arrow {
            width: 40px;
            height: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="title">OpenClaw 核心架构</div>
    <div class="diagram">
        <!-- 渠道层 -->
        <div class="layer">
            <div class="card">
                <svg class="card-icon" viewBox="0 0 50 50">
                    <rect x="8" y="12" width="34" height="26" rx="3" fill="none" stroke="#ff6b35" stroke-width="2"/>
                    <circle cx="18" cy="25" r="4" fill="#ff6b35"/>
                    <circle cx="32" cy="25" r="4" fill="#ff6b35"/>
                </svg>
                <div class="card-text">
                    <div class="card-title">渠道层</div>
                    <div class="card-desc">钉钉/Telegram/Discord</div>
                </div>
            </div>
            <svg class="arrow" viewBox="0 0 40 40">
                <path d="M20 5 L20 35 M10 25 L20 35 L30 25" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <!-- 核心层 -->
        <div class="core">
            <svg class="core-icon" viewBox="0 0 60 60">
                <circle cx="30" cy="30" r="25" fill="none" stroke="#ff6b35" stroke-width="2"/>
                <path d="M18 30 Q22 22 30 26 L30 26 Q35 28 40 22" stroke="#ff6b35" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="18" cy="30" r="3" fill="#ff6b35"/>
                <circle cx="30" cy="26" r="2.5" fill="#ff6b35"/>
                <circle cx="40" cy="22" r="3" fill="#ff6b35"/>
            </svg>
            <div class="core-text">
                <div class="core-title">OpenClaw Core</div>
                <div class="core-desc">会话管理 · 技能调度 · 工具编排</div>
            </div>
        </div>

        <!-- 工具层 -->
        <div class="layer">
            <div class="card">
                <svg class="card-icon" viewBox="0 0 50 50">
                    <rect x="12" y="10" width="26" height="30" rx="2" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <line x1="12" y1="22" x2="38" y2="22" stroke="#4a9eff" stroke-width="2"/>
                </svg>
                <div class="card-text">
                    <div class="card-title">文件工具</div>
                    <div class="card-desc">读写/编辑/管理</div>
                </div>
            </div>
            <div class="card">
                <svg class="card-icon" viewBox="0 0 50 50">
                    <rect x="5" y="12" width="40" height="26" rx="2" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <circle cx="25" cy="25" r="8" fill="none" stroke="#4a9eff" stroke-width="2"/>
                </svg>
                <div class="card-text">
                    <div class="card-title">浏览器</div>
                    <div class="card-desc">自动化/截图/交互</div>
                </div>
            </div>
            <div class="card">
                <svg class="card-icon" viewBox="0 0 50 50">
                    <rect x="10" y="15" width="30" height="20" rx="2" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <text x="25" y="30" text-anchor="middle" fill="#4a9eff" font-size="10" font-family="monospace">&gt;_</text>
                </svg>
                <div class="card-text">
                    <div class="card-title">终端</div>
                    <div class="card-desc">Shell 命令执行</div>
                </div>
            </div>
            <div class="card">
                <svg class="card-icon" viewBox="0 0 50 50">
                    <polygon points="25,8 30,22 45,22 34,32 39,47 25,37 11,47 16,32 5,22 20,22" fill="none" stroke="#ffcc00" stroke-width="2"/>
                </svg>
                <div class="card-text">
                    <div class="card-title">技能系统</div>
                    <div class="card-desc">可插拔 Skill</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
