<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 封面图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            color: white;
        }
        .logo {
            font-size: 180px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 69, 0, 0.8));
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(255, 69, 0, 0.6)); }
            to { filter: drop-shadow(0 0 40px rgba(255, 69, 0, 1)); }
        }
        h1 {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b35, #f7c59f, #ff6b35);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .subtitle {
            font-size: 32px;
            color: #a0a0a0;
            margin-top: 20px;
            letter-spacing: 8px;
        }
        .circuit {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body>
    <div class="circuit"></div>
    <div class="container">
        <div class="logo">🦞</div>
        <h1>OpenClaw</h1>
        <div class="subtitle">让 AI 真正动手做事</div>
    </div>
</body>
</html>
