<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 使用场景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1000px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .card-svg {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
        }
        .card-title {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a3e;
            margin-bottom: 15px;
        }
        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .title {
            position: absolute;
            top: 40px;
            color: #1a1a3e;
            font-size: 42px;
            font-weight: bold;
        }
        .highlight {
            color: #ff6b35;
        }
    </style>
</head>
<body>
    <div class="title">OpenClaw <span class="highlight">应用场景</span></div>
    <div class="container">
        <div class="card">
            <svg class="card-svg" viewBox="0 0 70 70">
                <rect x="10" y="15" width="50" height="40" rx="3" fill="none" stroke="#ff6b35" stroke-width="2"/>
                <line x1="15" y1="25" x2="55" y2="25" stroke="#ff6b35" stroke-width="2"/>
                <line x1="15" y1="35" x2="45" y2="35" stroke="#ff6b35" stroke-width="2"/>
                <line x1="15" y1="45" x2="50" y2="45" stroke="#ff6b35" stroke-width="2"/>
            </svg>
            <div class="card-title">内容创作</div>
            <div class="card-desc">写文章、生成报告、<br>整理资料、翻译文档</div>
        </div>
        <div class="card">
            <svg class="card-svg" viewBox="0 0 70 70">
                <rect x="15" y="20" width="40" height="30" fill="none" stroke="#4a9eff" stroke-width="2"/>
                <polyline points="20,40 30,30 40,35 50,25" fill="none" stroke="#4a9eff" stroke-width="2"/>
            </svg>
            <div class="card-title">数据分析</div>
            <div class="card-desc">抓取网页数据、<br>处理 Excel、生成图表</div>
        </div>
        <div class="card">
            <svg class="card-svg" viewBox="0 0 70 70">
                <circle cx="35" cy="35" r="25" fill="none" stroke="#50c878" stroke-width="2"/>
                <line x1="35" y1="35" x2="35" y2="20" stroke="#50c878" stroke-width="2"/>
                <line x1="35" y1="35" x2="45" y2="35" stroke="#50c878" stroke-width="2"/>
                <circle cx="35" cy="35" r="4" fill="#50c878"/>
            </svg>
            <div class="card-title">自动提醒</div>
            <div class="card-desc">定时任务、日程管理、<br>循环提醒、消息通知</div>
        </div>
        <div class="card">
            <svg class="card-svg" viewBox="0 0 70 70">
                <circle cx="35" cy="35" r="20" fill="none" stroke="#9b59b6" stroke-width="2"/>
                <circle cx="35" cy="35" r="8" fill="none" stroke="#9b59b6" stroke-width="2"/>
                <line x1="35" y1="15" x2="35" y2="27" stroke="#9b59b6" stroke-width="2"/>
                <line x1="35" y1="43" x2="35" y2="55" stroke="#9b59b6" stroke-width="2"/>
                <line x1="15" y1="35" x2="27" y2="35" stroke="#9b59b6" stroke-width="2"/>
                <line x1="43" y1="35" x2="55" y2="35" stroke="#9b59b6" stroke-width="2"/>
            </svg>
            <div class="card-title">信息搜集</div>
            <div class="card-desc">搜索调研、监控变化、<br>价格追踪、新闻聚合</div>
        </div>
        <div class="card">
            <svg class="card-svg" viewBox="0 0 70 70">
                <rect x="12" y="18" width="46" height="34" rx="4" fill="none" stroke="#e74c3c" stroke-width="2"/>
                <text x="35" y="42" text-anchor="middle" fill="#e74c3c" font-size="14" font-family="monospace">&lt;/&gt;</text>
            </svg>
            <div class="card-title">开发辅助</div>
            <div class="card-desc">代码生成、调试帮助、<br>文档查询、Git 操作</div>
        </div>
        <div class="card">
            <svg class="card-svg" viewBox="0 0 70 70">
                <rect x="20" y="25" width="30" height="20" rx="2" fill="none" stroke="#f39c12" stroke-width="2"/>
                <circle cx="35" cy="35" r="6" fill="none" stroke="#f39c12" stroke-width="2"/>
                <line x1="35" y1="25" x2="35" y2="29" stroke="#f39c12" stroke-width="2"/>
            </svg>
            <div class="card-title">智能家居</div>
            <div class="card-desc">设备控制、场景联动、<br>语音助手、自动化</div>
        </div>
    </div>
</body>
</html>
