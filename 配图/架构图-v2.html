<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 架构图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .diagram {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1000px;
        }
        .center {
            grid-column: 2;
            grid-row: 1 / span 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .core {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b35 0%, #c94a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 60px rgba(255, 107, 53, 0.6);
        }
        .core-svg {
            width: 100px;
            height: 100px;
        }
        .core-label {
            color: white;
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }
        .module {
            width: 180px;
            height: 120px;
            background: linear-gradient(135deg, #2a2a5a 0%, #1a1a3e 100%);
            border: 2px solid #4a4a8a;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .module-svg {
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
        }
        .module-name {
            font-size: 18px;
            font-weight: bold;
        }
        .module-desc {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .left { display: flex; flex-direction: column; justify-content: space-around; }
        .right { display: flex; flex-direction: column; justify-content: space-around; }
        .title {
            position: absolute;
            top: 30px;
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }
    </style>
</head>
<body>
    <div class="title">OpenClaw 核心架构</div>
    <div class="diagram">
        <div class="left">
            <div class="module">
                <svg class="module-svg" viewBox="0 0 50 50">
                    <rect x="10" y="8" width="30" height="34" rx="3" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <line x1="10" y1="20" x2="40" y2="20" stroke="#4a9eff" stroke-width="2"/>
                </svg>
                <div class="module-name">文件工具</div>
                <div class="module-desc">读写/编辑/管理</div>
            </div>
            <div class="module">
                <svg class="module-svg" viewBox="0 0 50 50">
                    <rect x="5" y="10" width="40" height="30" rx="2" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <circle cx="25" cy="25" r="8" fill="none" stroke="#4a9eff" stroke-width="2"/>
                </svg>
                <div class="module-name">浏览器</div>
                <div class="module-desc">自动化/截图/交互</div>
            </div>
            <div class="module">
                <svg class="module-svg" viewBox="0 0 50 50">
                    <rect x="8" y="12" width="34" height="26" rx="3" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <circle cx="15" cy="25" r="4" fill="#4a9eff"/>
                    <circle cx="35" cy="25" r="4" fill="#4a9eff"/>
                </svg>
                <div class="module-name">消息</div>
                <div class="module-desc">钉钉/Telegram/Discord</div>
            </div>
        </div>
        <div class="center">
            <div class="core">
                <svg class="core-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="white" opacity="0.3"/>
                    <path d="M30 50 L45 65 L70 35" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="core-label">OpenClaw Core</div>
        </div>
        <div class="right">
            <div class="module">
                <svg class="module-svg" viewBox="0 0 50 50">
                    <polygon points="25,5 30,20 45,20 33,30 38,45 25,35 12,45 17,30 5,20 20,20" fill="none" stroke="#ffcc00" stroke-width="2"/>
                </svg>
                <div class="module-name">技能系统</div>
                <div class="module-desc">可插拔 Skill</div>
            </div>
            <div class="module">
                <svg class="module-svg" viewBox="0 0 50 50">
                    <rect x="12" y="15" width="26" height="20" rx="2" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <text x="25" y="30" text-anchor="middle" fill="#4a9eff" font-size="12" font-family="monospace">&gt;_</text>
                </svg>
                <div class="module-name">终端</div>
                <div class="module-desc">Shell 命令执行</div>
            </div>
            <div class="module">
                <svg class="module-svg" viewBox="0 0 50 50">
                    <circle cx="25" cy="20" r="8" fill="none" stroke="#4a9eff" stroke-width="2"/>
                    <path d="M15 35 Q25 42 35 35" fill="none" stroke="#4a9eff" stroke-width="2"/>
                </svg>
                <div class="module-name">子代理</div>
                <div class="module-desc">任务编排</div>
            </div>
        </div>
    </div>
</body>
</html>
