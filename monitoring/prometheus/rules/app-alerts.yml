# 应用性能与用户体验告警规则
groups:
  - name: app_performance_alerts
    interval: 30s
    rules:
      # ==================== App 崩溃率告警 ====================
      - alert: AppCrashRateHigh
        expr: sum(rate(app_crash_total[5m])) / sum(rate(app_session_start_total[5m])) > 0.005
        for: 5m
        labels:
          severity: P1
          category: app_experience
        annotations:
          summary: "App 崩溃率过高"
          description: "App 崩溃率为 {{ $value | humanizePercentage }}，超过 0.5% 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/app-crash"

      - alert: AppCrashRateCritical
        expr: sum(rate(app_crash_total[5m])) / sum(rate(app_session_start_total[5m])) > 0.02
        for: 2m
        labels:
          severity: P0
          category: app_experience
        annotations:
          summary: "App 崩溃率严重过高"
          description: "App 崩溃率为 {{ $value | humanizePercentage }}，超过 2% 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/app-crash-critical"

      - alert: AppCrashSpike
        expr: sum(rate(app_crash_total[5m])) > sum(rate(app_crash_total[1h])) * 3
        for: 3m
        labels:
          severity: P1
          category: app_experience
        annotations:
          summary: "App 崩溃数异常激增"
          description: "当前崩溃率较 1 小时前增长超过 200%"
          runbook_url: "https://wiki.sleptapp.com/runbooks/app-crash-spike"

      # ==================== App 启动时间告警 ====================
      - alert: AppStartupTimeP95High
        expr: histogram_quantile(0.95, sum(rate(app_startup_duration_seconds_bucket[5m])) by (le, platform)) > 3
        for: 10m
        labels:
          severity: P2
          category: app_experience
        annotations:
          summary: "App 启动时间过长 - {{ $labels.platform }}"
          description: "{{ $labels.platform }} 平台 App 的 P95 启动时间为 {{ $value | humanizeDuration }}，超过 3s 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/app-slow-startup"

      - alert: AppStartupTimeP99Critical
        expr: histogram_quantile(0.99, sum(rate(app_startup_duration_seconds_bucket[5m])) by (le, platform)) > 5
        for: 5m
        labels:
          severity: P1
          category: app_experience
        annotations:
          summary: "App 启动时间严重过长 - {{ $labels.platform }}"
          description: "{{ $labels.platform }} 平台 App 的 P99 启动时间为 {{ $value | humanizeDuration }}，超过 5s 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/app-critical-slow-startup"

      # ==================== 页面加载时间告警 ====================
      - alert: PageLoadTimeP95High
        expr: histogram_quantile(0.95, sum(rate(page_load_duration_seconds_bucket{job="blackbox-frontend"}[5m])) by (le, instance)) > 2
        for: 10m
        labels:
          severity: P2
          category: app_experience
        annotations:
          summary: "页面加载时间过长 - {{ $labels.instance }}"
          description: "页面 {{ $labels.instance }} 的 P95 加载时间为 {{ $value | humanizeDuration }}，超过 2s 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/slow-page-load"

      - alert: PageLoadTimeP99Critical
        expr: histogram_quantile(0.99, sum(rate(page_load_duration_seconds_bucket{job="blackbox-frontend"}[5m])) by (le, instance)) > 4
        for: 5m
        labels:
          severity: P1
          category: app_experience
        annotations:
          summary: "页面加载时间严重过长 - {{ $labels.instance }}"
          description: "页面 {{ $labels.instance }} 的 P99 加载时间为 {{ $value | humanizeDuration }}，超过 4s 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/critical-slow-page-load"

      # ==================== 网络请求成功率告警 ====================
      - alert: NetworkRequestSuccessRateLow
        expr: sum(rate(app_network_request_total{success="true"}[5m])) / sum(rate(app_network_request_total[5m])) < 0.99
        for: 5m
        labels:
          severity: P2
          category: app_experience
        annotations:
          summary: "网络请求成功率过低"
          description: "网络请求成功率为 {{ $value | humanizePercentage }}，低于 99% 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/network-request-failure"

      - alert: NetworkRequestSuccessRateCritical
        expr: sum(rate(app_network_request_total{success="true"}[5m])) / sum(rate(app_network_request_total[5m])) < 0.95
        for: 2m
        labels:
          severity: P1
          category: app_experience
        annotations:
          summary: "网络请求成功率严重过低"
          description: "网络请求成功率为 {{ $value | humanizePercentage }}，低于 95% 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/critical-network-failure"

      # ==================== 数据库性能告警 ====================
      - alert: DBQueryTimeP95High
        expr: histogram_quantile(0.95, sum(rate(mysql_query_time_seconds_bucket[5m])) by (le, query_type)) > 0.1
        for: 5m
        labels:
          severity: P2
          category: database
        annotations:
          summary: "数据库查询时间过长 - {{ $labels.query_type }}"
          description: "{{ $labels.query_type }} 类型查询的 P95 耗时为 {{ $value | humanizeDuration }}，超过 100ms 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/slow-db-query"

      - alert: DBQueryTimeP99Critical
        expr: histogram_quantile(0.99, sum(rate(mysql_query_time_seconds_bucket[5m])) by (le, query_type)) > 0.5
        for: 2m
        labels:
          severity: P1
          category: database
        annotations:
          summary: "数据库查询时间严重过长 - {{ $labels.query_type }}"
          description: "{{ $labels.query_type }} 类型查询的 P99 耗时为 {{ $value | humanizeDuration }}，超过 500ms 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/critical-slow-db-query"

      - alert: DBConnectionPoolExhausted
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: P2
          category: database
        annotations:
          summary: "数据库连接池使用率过高"
          description: "数据库连接池使用率为 {{ $value | humanizePercentage }}，超过 80% 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/db-connection-pool"

      - alert: DBConnectionPoolCritical
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.95
        for: 2m
        labels:
          severity: P1
          category: database
        annotations:
          summary: "数据库连接池即将耗尽"
          description: "数据库连接池使用率为 {{ $value | humanizePercentage }}，超过 95% 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/db-connection-critical"

      - alert: DBReplicationLag
        expr: mysql_slave_status_seconds_behind_master > 30
        for: 5m
        labels:
          severity: P2
          category: database
        annotations:
          summary: "数据库复制延迟过高"
          description: "数据库主从复制延迟为 {{ $value }} 秒，超过 30s 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/db-replication-lag"

      - alert: DBReplicationLagCritical
        expr: mysql_slave_status_seconds_behind_master > 300
        for: 2m
        labels:
          severity: P1
          category: database
        annotations:
          summary: "数据库复制延迟严重过高"
          description: "数据库主从复制延迟为 {{ $value }} 秒，超过 5 分钟临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/db-replication-critical"

      # ==================== 慢查询告警 ====================
      - alert: DBSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 10
        for: 10m
        labels:
          severity: P2
          category: database
        annotations:
          summary: "数据库慢查询过多"
          description: "每秒慢查询数为 {{ $value | humanize }}，超过 10 次/秒"
          runbook_url: "https://wiki.sleptapp.com/runbooks/db-slow-queries"
