# API 性能告警规则
groups:
  - name: api_performance_alerts
    interval: 30s
    rules:
      # ==================== API 响应时间告警 ====================
      - alert: APIResponseTimeP95High
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="app-metrics"}[5m])) by (le, endpoint)) > 0.5
        for: 5m
        labels:
          severity: P1
          category: api_performance
        annotations:
          summary: "API 响应时间过高 - {{ $labels.endpoint }}"
          description: "API {{ $labels.endpoint }} 的 P95 响应时间为 {{ $value | humanizeDuration }}，超过 500ms 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-slow-response"

      - alert: APIResponseTimeP99Critical
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="app-metrics"}[5m])) by (le, endpoint)) > 1.0
        for: 2m
        labels:
          severity: P0
          category: api_performance
        annotations:
          summary: "API 响应时间严重过高 - {{ $labels.endpoint }}"
          description: "API {{ $labels.endpoint }} 的 P99 响应时间为 {{ $value | humanizeDuration }}，超过 1s 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-critical-slow"

      # ==================== API 错误率告警 ====================
      - alert: APIErrorRateHigh
        expr: sum(rate(http_requests_total{job="app-metrics", status=~"5.."}[5m])) / sum(rate(http_requests_total{job="app-metrics"}[5m])) > 0.01
        for: 3m
        labels:
          severity: P1
          category: api_error
        annotations:
          summary: "API 错误率过高"
          description: "API 5xx 错误率为 {{ $value | humanizePercentage }}，超过 1% 阈值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-error-rate"

      - alert: APIErrorRateCritical
        expr: sum(rate(http_requests_total{job="app-metrics", status=~"5.."}[5m])) / sum(rate(http_requests_total{job="app-metrics"}[5m])) > 0.05
        for: 1m
        labels:
          severity: P0
          category: api_error
        annotations:
          summary: "API 错误率严重过高"
          description: "API 5xx 错误率为 {{ $value | humanizePercentage }}，超过 5% 临界值"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-critical-error"

      # ==================== API 可用性告警 ====================
      - alert: APIEndpointDown
        expr: probe_success{job="blackbox-api"} == 0
        for: 1m
        labels:
          severity: P0
          category: api_availability
        annotations:
          summary: "API 端点不可用 - {{ $labels.instance }}"
          description: "API 端点 {{ $labels.instance }} 探测失败，服务可能已宕机"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-down"

      - alert: APIEndpointSlow
        expr: probe_duration_seconds{job="blackbox-api"} > 3
        for: 5m
        labels:
          severity: P2
          category: api_performance
        annotations:
          summary: "API 端点响应缓慢 - {{ $labels.instance }}"
          description: "API 端点 {{ $labels.instance }} 探测耗时 {{ $value | humanizeDuration }}，超过 3s"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-slow"

      # ==================== API QPS 异常告警 ====================
      - alert: APIQPSDrop
        expr: sum(rate(http_requests_total{job="app-metrics"}[5m])) < sum(rate(http_requests_total{job="app-metrics"}[1h])) * 0.5
        for: 5m
        labels:
          severity: P1
          category: api_traffic
        annotations:
          summary: "API 请求量异常下降"
          description: "当前 QPS 为 {{ $value | humanize }}，较 1 小时前下降超过 50%"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-qps-drop"

      - alert: APIQPSSpike
        expr: sum(rate(http_requests_total{job="app-metrics"}[5m])) > sum(rate(http_requests_total{job="app-metrics"}[1h])) * 2
        for: 3m
        labels:
          severity: P2
          category: api_traffic
        annotations:
          summary: "API 请求量异常激增"
          description: "当前 QPS 为 {{ $value | humanize }}，较 1 小时前增长超过 100%"
          runbook_url: "https://wiki.sleptapp.com/runbooks/api-qps-spike"
