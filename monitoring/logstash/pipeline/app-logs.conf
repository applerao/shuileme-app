# Logstash 管道配置 - 睡了么 App 日志处理

input {
  # Beats 输入 (Filebeat)
  beats {
    port => 5044
    ssl => false
  }

  # TCP 输入 (应用直接发送)
  tcp {
    port => 5000
    codec => json_lines
  }

  # UDP 输入
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # 解析 JSON 日志
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # 合并解析后的字段到顶层
  if [parsed] {
    mutate {
      add_field => {
        "log_level" => "%{[parsed][level]}"
        "service_name" => "%{[parsed][service]}"
        "trace_id" => "%{[parsed][trace_id]}"
        "user_id" => "%{[parsed][user_id]}"
        "request_id" => "%{[parsed][request_id]}"
        "http_method" => "%{[parsed][method]}"
        "http_path" => "%{[parsed][path]}"
        "http_status" => "%{[parsed][status]}"
        "response_time" => "%{[parsed][response_time]}"
        "error_message" => "%{[parsed][error]}"
        "app_version" => "%{[parsed][app_version]}"
        "platform" => "%{[parsed][platform]}"
        "device_model" => "%{[parsed][device_model]}"
        "os_version" => "%{[parsed][os_version]}"
      }
    }
  }

  # 解析时间戳
  date {
    match => ["[parsed][timestamp]", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
    timezone => "Asia/Shanghai"
  }

  # 根据日志级别分类
  if [log_level] in ["ERROR", "error", "FATAL", "fatal"] {
    mutate {
      add_field => { "severity" => "high" }
    }
  } else if [log_level] in ["WARN", "warn", "WARNING", "warning"] {
    mutate {
      add_field => { "severity" => "medium" }
    }
  } else {
    mutate {
      add_field => { "severity" => "low" }
    }
  }

  # 提取 API 路径中的关键信息
  if [http_path] {
    grok {
      match => { "http_path" => "/api/%{NUMBER:api_version}/%{WORD:api_module}/%{GREEDYDATA:api_action}" }
      overwrite => ["api_version", "api_module", "api_action"]
    }
  }

  # 根据响应时间分类性能
  if [response_time] {
    if [response_time] > 1000 {
      mutate {
        add_field => { "performance_tier" => "slow" }
      }
    } else if [response_time] > 500 {
      mutate {
        add_field => { "performance_tier" => "medium" }
      }
    } else {
      mutate {
        add_field => { "performance_tier" => "fast" }
      }
    }
  }

  # 删除原始 message 字段 (可选)
  # mutate {
  #   remove_field => ["message", "parsed", "host", "agent"]
  # }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    
    # 根据日志类型动态索引
    index => "slept-logs-%{+YYYY.MM.dd}"
    
    # 模板设置
    template => "/usr/share/logstash/pipeline/index-template.json"
    template_name => "slept-logs"
    template_overwrite => true
    
    # 批量设置
    manage_template => true
    bulk_actions => 1000
    flush_interval => 5
  }

  # 错误日志单独输出 (便于调试)
  if [severity] == "high" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "slept-errors-%{+YYYY.MM.dd}"
    }
  }

  # 控制台输出 (调试用)
  # stdout {
  #   codec => rubydebug
  # }
}
