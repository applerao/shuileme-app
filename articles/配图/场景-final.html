<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用场景</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
        }
        .title {
            position: absolute;
            top: 50px;
            font-size: 48px;
            font-weight: 900;
            color: #1a1a3e;
            letter-spacing: 8px;
        }
        .title span {
            color: #ff6b35;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1100px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icon-box svg {
            width: 45px;
            height: 45px;
        }
        .card-title {
            font-size: 22px;
            font-weight: bold;
            color: #1a1a3e;
            margin-bottom: 12px;
        }
        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }
        /* 颜色主题 */
        .theme-1 .icon-box { background: rgba(255, 107, 53, 0.1); }
        .theme-1 svg { stroke: #ff6b35; }
        
        .theme-2 .icon-box { background: rgba(74, 158, 255, 0.1); }
        .theme-2 svg { stroke: #4a9eff; }
        
        .theme-3 .icon-box { background: rgba(80, 200, 120, 0.1); }
        .theme-3 svg { stroke: #50c878; }
        
        .theme-4 .icon-box { background: rgba(155, 89, 182, 0.1); }
        .theme-4 svg { stroke: #9b59b6; }
        
        .theme-5 .icon-box { background: rgba(231, 76, 60, 0.1); }
        .theme-5 svg { stroke: #e74c3c; }
        
        .theme-6 .icon-box { background: rgba(243, 156, 18, 0.1); }
        .theme-6 svg { stroke: #f39c12; }
    </style>
</head>
<body>
    <div class="title">OpenClaw <span>应用场景</span></div>
    <div class="grid">
        <div class="card theme-1">
            <div class="icon-box">
                <svg viewBox="0 0 50 50" fill="none" stroke-width="2">
                    <rect x="10" y="12" width="30" height="26" rx="3"/>
                    <line x1="15" y1="22" x2="35" y2="22"/>
                    <line x1="15" y1="30" x2="30" y2="30"/>
                </svg>
            </div>
            <div class="card-title">内容创作</div>
            <div class="card-desc">写文章 · 生成报告<br>整理资料 · 翻译文档</div>
        </div>

        <div class="card theme-2">
            <div class="icon-box">
                <svg viewBox="0 0 50 50" fill="none" stroke-width="2">
                    <rect x="8" y="15" width="34" height="20" rx="2"/>
                    <polyline points="12,28 20,22 28,26 38,18"/>
                </svg>
            </div>
            <div class="card-title">数据分析</div>
            <div class="card-desc">抓取网页数据<br>处理 Excel · 生成图表</div>
        </div>

        <div class="card theme-3">
            <div class="icon-box">
                <svg viewBox="0 0 50 50" fill="none" stroke-width="2">
                    <circle cx="25" cy="25" r="18"/>
                    <line x1="25" y1="25" x2="25" y2="12"/>
                    <line x1="25" y1="25" x2="35" y2="25"/>
                </svg>
            </div>
            <div class="card-title">自动提醒</div>
            <div class="card-desc">定时任务 · 日程管理<br>循环提醒 · 消息通知</div>
        </div>

        <div class="card theme-4">
            <div class="icon-box">
                <svg viewBox="0 0 50 50" fill="none" stroke-width="2">
                    <circle cx="25" cy="25" r="15"/>
                    <circle cx="25" cy="25" r="6"/>
                    <line x1="25" y1="10" x2="25" y2="19"/>
                    <line x1="25" y1="31" x2="25" y2="40"/>
                    <line x1="10" y1="25" x2="19" y2="25"/>
                    <line x1="31" y1="25" x2="40" y2="25"/>
                </svg>
            </div>
            <div class="card-title">信息搜集</div>
            <div class="card-desc">搜索调研 · 监控变化<br>价格追踪 · 新闻聚合</div>
        </div>

        <div class="card theme-5">
            <div class="icon-box">
                <svg viewBox="0 0 50 50" fill="none" stroke-width="2">
                    <rect x="10" y="12" width="30" height="26" rx="4"/>
                    <text x="25" y="32" text-anchor="middle" font-size="12" font-family="monospace">&lt;/&gt;</text>
                </svg>
            </div>
            <div class="card-title">开发辅助</div>
            <div class="card-desc">代码生成 · 调试帮助<br>文档查询 · Git 操作</div>
        </div>

        <div class="card theme-6">
            <div class="icon-box">
                <svg viewBox="0 0 50 50" fill="none" stroke-width="2">
                    <rect x="15" y="20" width="20" height="14" rx="2"/>
                    <circle cx="25" cy="27" r="5"/>
                    <line x1="25" y1="20" x2="25" y2="22"/>
                </svg>
            </div>
            <div class="card-title">智能家居</div>
            <div class="card-desc">设备控制 · 场景联动<br>语音助手 · 自动化</div>
        </div>
    </div>
</body>
</html>
