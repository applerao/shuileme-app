<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封面图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 50%, #2d1b3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            overflow: hidden;
        }
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 107, 53, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 53, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .content {
            text-align: center;
            z-index: 10;
        }
        .logo-circle {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            background: radial-gradient(circle, #ff6b35 0%, #c94a2a 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 80px rgba(255, 107, 53, 0.6);
            position: relative;
        }
        .logo-circle::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(255, 107, 53, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .claw-icon {
            width: 100px;
            height: 100px;
        }
        h1 {
            font-size: 80px;
            font-weight: 900;
            color: white;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(255, 107, 53, 0.5);
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 12px;
            font-weight: 300;
        }
        .tag {
            display: inline-block;
            padding: 8px 24px;
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid rgba(255, 107, 53, 0.5);
            border-radius: 20px;
            color: #ff6b35;
            font-size: 16px;
            margin-top: 40px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="content">
        <div class="logo-circle">
            <svg class="claw-icon" viewBox="0 0 100 100">
                <path d="M30 55 Q35 45 45 50 L45 50 Q50 52 55 45 L55 45 Q60 35 70 40" 
                      stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="30" cy="55" r="5" fill="white"/>
                <circle cx="45" cy="50" r="4" fill="white"/>
                <circle cx="55" cy="45" r="3" fill="white"/>
                <circle cx="70" cy="40" r="4" fill="white"/>
            </svg>
        </div>
        <h1>OpenClaw</h1>
        <div class="subtitle">给 AI 装上爪子</div>
        <div class="tag">让 AI 真正动手做事</div>
    </div>
</body>
</html>
