<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 架构图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .diagram {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1000px;
        }
        .center {
            grid-column: 2;
            grid-row: 1 / span 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .core {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b35 0%, #c94a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            box-shadow: 0 0 60px rgba(255, 107, 53, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(255, 107, 53, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(255, 107, 53, 0.8); }
        }
        .core-label {
            color: white;
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }
        .module {
            width: 180px;
            height: 120px;
            background: linear-gradient(135deg, #2a2a5a 0%, #1a1a3e 100%);
            border: 2px solid #4a4a8a;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }
        .module-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .module-name {
            font-size: 18px;
            font-weight: bold;
        }
        .module-desc {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .left { display: flex; flex-direction: column; justify-content: space-around; }
        .right { display: flex; flex-direction: column; justify-content: space-around; }
        .title {
            position: absolute;
            top: 30px;
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }
    </style>
</head>
<body>
    <div class="title">OpenClaw 核心架构</div>
    <div class="diagram">
        <div class="left">
            <div class="module">
                <div class="module-icon">📁</div>
                <div class="module-name">文件工具</div>
                <div class="module-desc">读写/编辑/管理</div>
            </div>
            <div class="module">
                <div class="module-icon">🌐</div>
                <div class="module-name">浏览器</div>
                <div class="module-desc">自动化/截图/交互</div>
            </div>
            <div class="module">
                <div class="module-icon">💬</div>
                <div class="module-name">消息</div>
                <div class="module-desc">钉钉/Telegram/Discord</div>
            </div>
        </div>
        <div class="center">
            <div class="core">🦞</div>
            <div class="core-label">OpenClaw Core</div>
        </div>
        <div class="right">
            <div class="module">
                <div class="module-icon">⚡</div>
                <div class="module-name">技能系统</div>
                <div class="module-desc">可插拔 Skill</div>
            </div>
            <div class="module">
                <div class="module-icon">🔧</div>
                <div class="module-name">终端</div>
                <div class="module-desc">Shell 命令执行</div>
            </div>
            <div class="module">
                <div class="module-icon">🤖</div>
                <div class="module-name">子代理</div>
                <div class="module-desc">任务编排</div>
            </div>
        </div>
    </div>
</body>
</html>
